steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/logos-interior', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/logos-interior']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'logos-interior'
      - '--image'
      - 'gcr.io/$PROJECT_ID/logos-interior'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'

# Pass your Gemini API key as a Cloud Build substitution:
# gcloud builds submit --substitutions=_GEMINI_API_KEY=your_key
substitutions:
  _GEMINI_API_KEY: ''
